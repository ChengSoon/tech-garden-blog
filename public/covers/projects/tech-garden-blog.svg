<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="技术刊数字花园封面">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101814"/>
      <stop offset="50%" stop-color="#1a2e28"/>
      <stop offset="100%" stop-color="#162018"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="940" cy="180" r="170" fill="#84b9a8" opacity="0.12"/>
  <circle cx="200" cy="500" r="200" fill="#c9a227" opacity="0.08"/>

  <!-- constellation nodes -->
  <g stroke="#84b9a8" stroke-width="2" fill="none" opacity="0.55">
    <line x1="860" y1="220" x2="980" y2="300"/>
    <line x1="980" y1="300" x2="900" y2="400"/>
    <line x1="860" y1="220" x2="900" y2="400"/>
  </g>
  <circle cx="860" cy="220" r="10" fill="#84b9a8"/>
  <circle cx="980" cy="300" r="8" fill="#c9a227"/>
  <circle cx="900" cy="400" r="9" fill="#ef8066" opacity="0.9"/>

  <!-- vinyl hint -->
  <g transform="translate(980,430)" opacity="0.55">
    <circle r="70" fill="none" stroke="#84b9a8" stroke-width="2"/>
    <circle r="48" fill="none" stroke="#303a34" stroke-width="1.5"/>
    <circle r="10" fill="#84b9a8"/>
  </g>

  <text x="72" y="108" fill="#84b9a8" font-family="Sora, sans-serif" font-size="20" letter-spacing="5">PROJECT · SITE</text>
  <text x="72" y="250" fill="#f4faf7" font-family="Georgia, serif" font-size="64" font-weight="600">技术刊 · 数字花园</text>
  <text x="72" y="322" fill="#d4e7df" font-family="Georgia, serif" font-size="32">杂志级阅读与双向链接</text>
  <text x="72" y="400" fill="#9db5ab" font-family="Sora, sans-serif" font-size="20">Astro · TypeScript · Tailwind · Garden Graph</text>
  <text x="72" y="540" fill="#7f9189" font-family="Sora, sans-serif" font-size="18">blog.lzch.eu.org</text>
