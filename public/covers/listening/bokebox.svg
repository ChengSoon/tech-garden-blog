<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="BokeBox 播匣封面">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="45%" stop-color="#151b33"/>
      <stop offset="100%" stop-color="#1a1430"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2550"/>
      <stop offset="100%" stop-color="#17142e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="50%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="980" cy="140" r="180" fill="#38bdf8" opacity="0.08"/>
  <circle cx="180" cy="520" r="200" fill="#7c5cff" opacity="0.1"/>

  <text x="72" y="108" fill="#9aa8ff" font-family="Sora, system-ui, sans-serif" font-size="20" letter-spacing="5">OPEN SOURCE · AI PODCAST</text>
  <text x="72" y="248" fill="#f4f1ff" font-family="Georgia, serif" font-size="68" font-weight="600">BokeBox · 播匣</text>
  <text x="72" y="318" fill="#c7c0e8" font-family="Georgia, serif" font-size="32">内容进匣，AI 成播</text>
  <text x="72" y="390" fill="#8f96b8" font-family="Sora, system-ui, sans-serif" font-size="20">多源输入 · 私人播客 · MCP · 自托管</text>
  <text x="72" y="540" fill="#6d7390" font-family="Sora, system-ui, sans-serif" font-size="18">技术刊 · 开源推荐</text>

  <!-- podcast box mock -->
  <g transform="translate(760,110)">
    <rect x="0" y="0" width="340" height="420" rx="28" fill="url(#box)" stroke="#3d3668" stroke-width="2"/>
    <rect x="24" y="28" width="292" height="180" rx="18" fill="#0f1020"/>
    <!-- waveform -->
    <g transform="translate(48,90)" fill="url(#wave)">
      <rect x="0" y="40" width="10" height="40" rx="5"/>
      <rect x="22" y="24" width="10" height="72" rx="5"/>
      <rect x="44" y="10" width="10" height="100" rx="5"/>
      <rect x="66" y="28" width="10" height="64" rx="5"/>
      <rect x="88" y="4" width="10" height="112" rx="5"/>
      <rect x="110" y="20" width="10" height="80" rx="5"/>
      <rect x="132" y="36" width="10" height="48" rx="5"/>
      <rect x="154" y="16" width="10" height="88" rx="5"/>
      <rect x="176" y="30" width="10" height="60" rx="5"/>
      <rect x="198" y="12" width="10" height="96" rx="5"/>
      <rect x="220" y="42" width="10" height="36" rx="5"/>
    </g>
    <circle cx="170" cy="118" r="28" fill="#7c5cff" opacity="0.9"/>
    <polygon points="162,104 186,118 162,132" fill="#fff"/>
    <text x="24" y="248" fill="#e8e4ff" font-family="Georgia, serif" font-size="24">私人节目库</text>
    <text x="24" y="280" fill="#8b86b0" font-family="Sora, system-ui, sans-serif" font-size="14">视频 · 链接 · 文稿 → 口播</text>
    <rect x="24" y="310" width="120" height="10" rx="5" fill="#7c5cff" opacity="0.55"/>
    <rect x="24" y="332" width="200" height="8" rx="4" fill="#3d3668"/>
    <rect x="24" y="356" width="160" height="8" rx="4" fill="#3d3668"/>
    <rect x="24" y="380" width="88" height="22" rx="11" fill="#38bdf8" opacity="0.85"/>
  </g>
</svg>
